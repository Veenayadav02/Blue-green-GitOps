apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/veenayadav02/health-website:1
        ports:
        - containerPort: 80

  strategy:
    blueGreen:
      activeService: frontend-active
      previewService: frontend-preview

      autoPromotionEnabled: false

      previewReplicaCount: 1

      scaleDownDelaySeconds: 30
